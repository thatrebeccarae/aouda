<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520">
  <style>
    .bg { fill: #1e1e2e; }
    .titlebar { fill: #181825; }
    .titletext { fill: #6c7086; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; }
    .red { fill: #f38ba8; }
    .yellow { fill: #f9e2af; }
    .green { fill: #a6e3a1; }
    .text { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .dim { fill: #6c7086; }
    .cyan { fill: #89dceb; }
    .teal { fill: #94e2d5; }
    .mauve { fill: #cba6f7; }
    .peach { fill: #fab387; }
    .greentext { fill: #a6e3a1; }
    .prompt { fill: #89b4fa; }
    .bold { font-weight: bold; }
  </style>

  <!-- Window -->
  <rect class="bg" width="760" height="520" rx="10" ry="10"/>

  <!-- Title bar -->
  <rect class="titlebar" width="760" height="36" rx="10" ry="10"/>
  <rect class="titlebar" y="20" width="760" height="16"/>

  <!-- Traffic lights -->
  <circle class="red" cx="20" cy="18" r="6"/>
  <circle class="yellow" cx="40" cy="18" r="6"/>
  <circle class="green" cx="60" cy="18" r="6"/>

  <!-- Title -->
  <text class="titletext" x="380" y="22" text-anchor="middle">Terminal</text>

  <!-- Content -->
  <!-- Line 1: prompt + command -->
  <text y="66" x="20">
    <tspan class="prompt">$</tspan>
    <tspan class="text"> pnpm dev</tspan>
  </text>

  <!-- Line 2: blank -->

  <!-- Line 3: startup banner -->
  <text class="mauve bold" y="96" x="20">Aouda v0.1.0</text>

  <!-- Line 4-5: config loading -->
  <text y="120" x="20">
    <tspan class="dim">[config]</tspan>
    <tspan class="text"> Loading soul.md</tspan>
    <tspan class="greentext"> ...</tspan>
    <tspan class="teal"> loaded</tspan>
  </text>
  <text y="144" x="20">
    <tspan class="dim">[config]</tspan>
    <tspan class="text"> Identity: Agent (Operator)</tspan>
  </text>

  <!-- Line 6-9: LLM providers -->
  <text y="172" x="20">
    <tspan class="dim">[llm]</tspan>
    <tspan class="text"> Anthropic</tspan>
    <tspan class="dim"> ................</tspan>
    <tspan class="greentext"> connected</tspan>
  </text>
  <text y="196" x="20">
    <tspan class="dim">[llm]</tspan>
    <tspan class="text"> OpenAI</tspan>
    <tspan class="dim"> ..................</tspan>
    <tspan class="greentext"> connected</tspan>
  </text>
  <text y="220" x="20">
    <tspan class="dim">[llm]</tspan>
    <tspan class="text"> Ollama</tspan>
    <tspan class="dim"> ..................</tspan>
    <tspan class="peach"> skipped</tspan>
  </text>

  <!-- Line 10-14: integrations -->
  <text y="252" x="20">
    <tspan class="dim">[tools]</tspan>
    <tspan class="text"> Registered 42 tools</tspan>
  </text>
  <text y="276" x="20">
    <tspan class="dim">[gmail]</tspan>
    <tspan class="text"> OAuth</tspan>
    <tspan class="dim"> ....................</tspan>
    <tspan class="greentext"> ready</tspan>
  </text>
  <text y="300" x="20">
    <tspan class="dim">[calendar]</tspan>
    <tspan class="text"> OAuth</tspan>
    <tspan class="dim"> .................</tspan>
    <tspan class="greentext"> ready</tspan>
  </text>
  <text y="324" x="20">
    <tspan class="dim">[miniflux]</tspan>
    <tspan class="text"> RSS feeds</tspan>
    <tspan class="dim"> .............</tspan>
    <tspan class="greentext"> 47 feeds</tspan>
  </text>
  <text y="348" x="20">
    <tspan class="dim">[browser]</tspan>
    <tspan class="text"> Playwright</tspan>
    <tspan class="dim"> ............</tspan>
    <tspan class="greentext"> available</tspan>
  </text>

  <!-- Line 15-16: channels -->
  <text y="380" x="20">
    <tspan class="dim">[telegram]</tspan>
    <tspan class="text"> Bot connected</tspan>
    <tspan class="dim"> ...........</tspan>
    <tspan class="greentext"> polling</tspan>
  </text>
  <text y="404" x="20">
    <tspan class="dim">[dashboard]</tspan>
    <tspan class="text"> http://localhost:3210</tspan>
  </text>

  <!-- Line 17: security -->
  <text y="432" x="20">
    <tspan class="dim">[security]</tspan>
    <tspan class="text"> Content boundaries active, sandbox ready</tspan>
  </text>

  <!-- Line 18: quiet hours -->
  <text y="456" x="20">
    <tspan class="dim">[quiet]</tspan>
    <tspan class="text"> Quiet hours: 22:00 - 07:00</tspan>
  </text>

  <!-- Line 19: ready -->
  <text y="488" x="20">
    <tspan class="greentext bold">Ready.</tspan>
    <tspan class="text"> Waiting for messages...</tspan>
  </text>
</svg>
